<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="196" viewBox="0 0 880 196" role="img" aria-label="Servicios de Converly: agentes de voz, automatizaciones y desarrollo a medida">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12224a"/>
      <stop offset="100%" stop-color="#0b1730"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e7bff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0051ff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c2ff"/>
      <stop offset="100%" stop-color="#1e7bff"/>
    </linearGradient>
  </defs>

  <!-- Card 1: Agentes de voz -->
  <g>
    <rect x="8" y="12" width="277" height="172" rx="18" fill="url(#cardBg)" stroke="url(#cardStroke)" stroke-width="1.4"/>
    <circle cx="50" cy="54" r="19" fill="#1e7bff" fill-opacity="0.16"/>
    <g transform="translate(50,54)" stroke="#4da4ff" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-7 1 v-2 a7 7 0 0 1 14 0 v2"/>
      <rect x="-9.5" y="1" width="4.5" height="8" rx="2.2" fill="#4da4ff" stroke="none"/>
      <rect x="5" y="1" width="4.5" height="8" rx="2.2" fill="#4da4ff" stroke="none"/>
      <path d="M7 9 v2 a3 3 0 0 1 -3 3 h-4"/>
    </g>
    <text x="80" y="48" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="700">Agentes de voz</text>
    <text x="80" y="68" fill="#8fa6d6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12">Atiende y realiza llamadas</text>
    <rect x="80" y="76" width="34" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="28" y="116" fill="#b9c6e6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12.5">IA conversacional que agenda,</text>
    <text x="28" y="136" fill="#b9c6e6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12.5">confirma y transfiere a humano.</text>
    <text x="28" y="162" fill="#6f83b3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11">Integrado con CRM y calendario</text>
  </g>

  <!-- Card 2: Automatizaciones -->
  <g>
    <rect x="301" y="12" width="277" height="172" rx="18" fill="url(#cardBg)" stroke="url(#cardStroke)" stroke-width="1.4"/>
    <circle cx="343" cy="54" r="19" fill="#1e7bff" fill-opacity="0.16"/>
    <g transform="translate(343,54)" stroke="#4da4ff" stroke-width="1.9" fill="none" stroke-linecap="round">
      <circle cx="-7" cy="-6" r="2.8" fill="#4da4ff" stroke="none"/>
      <circle cx="-7" cy="6" r="2.8" fill="#4da4ff" stroke="none"/>
      <circle cx="7" cy="0" r="2.8" fill="#4da4ff" stroke="none"/>
      <path d="M-4.4 -5 C0 -4 2.4 -2 4.8 -0.7"/>
      <path d="M-4.4 5 C0 4 2.4 2 4.8 0.7"/>
    </g>
    <text x="373" y="48" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="700">Automatizaciones</text>
    <text x="373" y="68" fill="#8fa6d6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12">Workflows sin trabajo manual</text>
    <rect x="373" y="76" width="34" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="321" y="116" fill="#b9c6e6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12.5">n8n + APIs conectando CRM, ERP,</text>
    <text x="321" y="136" fill="#b9c6e6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12.5">facturaci&#243;n y marketing.</text>
    <text x="321" y="162" fill="#6f83b3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11">Menos tareas repetitivas, menos errores</text>
  </g>

  <!-- Card 3: Desarrollo a medida -->
  <g>
    <rect x="594" y="12" width="278" height="172" rx="18" fill="url(#cardBg)" stroke="url(#cardStroke)" stroke-width="1.4"/>
    <circle cx="636" cy="54" r="19" fill="#1e7bff" fill-opacity="0.16"/>
    <g transform="translate(636,54)" stroke="#4da4ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-4 -7 L-10 0 L-4 7"/>
      <path d="M4 -7 L10 0 L4 7"/>
      <path d="M1.5 -9 L-1.5 9"/>
    </g>
    <text x="666" y="48" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="700">Desarrollo a medida</text>
    <text x="666" y="68" fill="#8fa6d6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12">Productos que convierten</text>
    <rect x="666" y="76" width="34" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="614" y="116" fill="#b9c6e6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12.5">Webs, landings, dashboards y apps</text>
    <text x="614" y="136" fill="#b9c6e6" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12.5">con IA integrada.</text>
    <text x="614" y="162" fill="#6f83b3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11">Optimizado para SEO y rendimiento</text>
  </g>
</svg>
